# -- claude-pilot permission policy ----------------------------------------
#
# Schema:
#   rules:          Ordered list of rules. First match wins.
#     - id:         Unique identifier for audit trail
#       tool:       Tool name to match (case-sensitive, e.g. "Bash", "Skill")
#       pattern:    Regex matched against the tool's primary input field:
#                     Bash  -> command
#                     Write/Edit/Read -> file_path
#                     Glob/Grep -> pattern
#                     Skill -> skill name
#                     Other -> str(tool_input)
#       decision:   "allow" | "deny" | "escalate"
#                     "escalate" returns deny + best-effort operator notify
#                     (deny-with-notify; see permissions.py handler dispatch).
#       reason:     Human-readable explanation (shown in logs, notify payload)
#
#   default:        Fallback when no rule matches.
#     decision:     "allow" | "deny" | "escalate"
#     reason:       Human-readable explanation
#
# Notes:
#   - Tier 1 fast-path (read-only file ops, safe binaries) is consulted before
#     this file via permissions.py::is_tier1_auto_approve. Anything that takes
#     that path is auto-allowed without entering the rules list.
#   - Operator override: set MIKA_PILOT_POLICY_PATH=<path> to point at a
#     different file. Used for temporary overlays (e.g. widened groom-phase
#     allowlists) without rebuilding cpp. The override remains as escape
#     hatch; this bundled file is the production default.
#   - Groom-phase rules were derived from groom-phase pilot evidence (mika
#     dispatch-lib `_run_claude_pilot` calls captured 2026-05-28). Dev-pilot
#     phase Bash footprint (mkdir / PATH-bootstrap / cp-mv-rm / cargo / npm /
#     uv / node) was enumerated 2026-06-03 (claude-pilot#25) from the blocked
#     dispatches mika#1116, mika#1260, mika#765.
#   - Why broad-looking `allow` rules below are safe: a policy rule matches a
#     single regex against the WHOLE command string (policy.py first-match-wins
#     — no compound-split, no danger scan). permissions.py
#     `_bash_allow_is_chain_safe` re-applies tier1's tier3-danger +
#     command-substitution scan over any Bash command a rule allows, so a
#     chained dangerous tail (`mkdir foo && rm -rf ~`) is vetoed and downgraded
#     to deny. File creation goes through the Write/Edit tools (tier1
#     path-containment), so no Bash file-editor rule is needed here.
# --------------------------------------------------------------------------

rules:
  # ---- Read-only repo orientation ----
  # Common pre-work Bash commands that pilots use to understand the codebase
  # before making changes. Confirmed in mika#1253's pre-wedge pilot log.

  - id: bash-find
    tool: Bash
    pattern: "^find\\s"
    decision: allow
    reason: "find for repo orientation"

  - id: bash-grep
    tool: Bash
    pattern: "^grep\\s|\\sgrep\\s"
    decision: allow
    reason: "grep for source-code research"

  - id: bash-jq
    tool: Bash
    pattern: "^(for\\s.*do\\s+.*\\s)?jq\\s|;\\s*jq\\s"
    decision: allow
    reason: "jq for skill-manifest and JSON inspection"

  - id: bash-for-loop-orientation
    tool: Bash
    pattern: "^for\\s+\\w+\\s+in\\s.*;\\s*do\\s"
    decision: allow
    reason: "shell-for loops for batch orientation queries"

  - id: bash-cat-heredoc-tmp
    tool: Bash
    pattern: "^cat\\s+>\\s+/tmp/.*<<\\s*'?EOF'?"
    decision: allow
    reason: "heredoc to /tmp for helper scripts (groom-phase)"

  # ---- Git operations ----
  # The slash-command-driven groom phase requires git read + plan-doc commit
  # + push. Read-only ops are always safe; commit/push are gated by the
  # slash command's own state machine, not by policy.

  - id: bash-git-readonly
    tool: Bash
    pattern: "^git\\s+(status|log|diff|show|branch|rev-parse|fetch|ls-remote|worktree)"
    decision: allow
    reason: "git read-only operations"

  - id: bash-git-stage-commit
    tool: Bash
    pattern: "^git\\s+(add|commit)"
    decision: allow
    reason: "git add + git commit (plan-authoring phase)"

  - id: bash-git-push
    tool: Bash
    pattern: "^git\\s+push(\\s|$)"
    decision: allow
    reason: "git push (groom-phase plan publication)"

  # ---- GitHub CLI read-only ops ----

  - id: bash-gh-issue-read
    tool: Bash
    pattern: "^gh\\s+issue\\s+(view|list)"
    decision: allow
    reason: "gh issue view/list (ticket grounding)"

  - id: bash-gh-pr-read
    tool: Bash
    pattern: "^gh\\s+pr\\s+(view|list|diff|checks)"
    decision: allow
    reason: "gh pr view/list/diff/checks (PR grounding)"

  # ---- GitHub CLI write -- gated ----
  # gh issue create is handled by the mika-issue skill, which routes
  # through agent-tier authority. Direct CLI use bypasses that.

  - id: gh-issue-create-deny
    tool: Bash
    pattern: "gh\\s+issue\\s+create"
    decision: deny
    reason: "gh issue create is handled by mika-issue skill -- direct CLI use denied"

  # ---- Skill tool -- non-platform agent escalation ----

  - id: mika-ask-non-platform-agent
    tool: Skill
    pattern: "^mika-ask$"
    decision: escalate
    reason: "mika-ask targets external agents -- escalate (deny + notify) for operator review"

  # ---- Dev-pilot phase (claude-pilot#25) ----
  # Bash footprint the dev-pilot pipeline needs but groom-phase rules never
  # covered. All chained-danger safety is enforced by permissions.py
  # `_bash_allow_is_chain_safe` (re-applies tier1 tier3 + command-substitution
  # scan over the whole command), so these patterns only need to (a) match the
  # intended command shape and (b) reject absolute paths / `..` traversal to
  # honor worktree-scoping. cargo/npm/npx are already tier1-auto-approved when
  # standalone; the rules here cover them inside a PATH-bootstrap compound and
  # as defense-in-depth.

  - id: bash-mkdir
    tool: Bash
    pattern: '^mkdir(\s+-\S+)*\s+(?!/)(?!.*\.\.)\S'
    decision: allow
    reason: "mkdir (relative, no .. traversal) -- dev-pilot worktree scaffolding (mika#1116: mkdir -p crates/mika-os/src)"

  - id: bash-cp-mv
    tool: Bash
    pattern: '^(cp|mv)\s+(?!/)(?!.*\s/)(?!.*\.\.)\S'
    decision: allow
    reason: "cp/mv (relative operands, no .. or absolute) -- dev-pilot file moves within worktree"

  - id: bash-rm
    tool: Bash
    pattern: '^rm\s+(?!/)(?!.*\s/)(?!.*\.\.)\S'
    decision: allow
    reason: "rm (relative, no .. or absolute) -- dev-pilot cleanup; rm -rf stays denied by the chained-danger guard (tier3)"

  - id: bash-cargo
    tool: Bash
    pattern: '^cargo\s+(build|test|check|clippy|fmt|run|clean|doc|tree)\b'
    decision: allow
    reason: "cargo build/test/check/clippy/fmt/run/clean/doc/tree -- dev-pilot Rust toolchain (cargo publish excluded, tier3-denied)"

  - id: bash-npm
    tool: Bash
    pattern: '^npm\s+(ci|install|run|test|start)\b'
    decision: allow
    reason: "npm ci/install/run/test/start -- dev-pilot Node toolchain (mika#1260)"

  - id: bash-uv
    tool: Bash
    pattern: '^uv\s+(tool|sync|run|lock|venv|pip|add)\b'
    decision: allow
    reason: "uv tool/sync/run/lock/venv/pip/add -- dev-pilot Python toolchain (CLAUDE.md: uv tool install --force .)"

  - id: bash-node-npx
    tool: Bash
    pattern: '^(node|npx)\s'
    decision: allow
    reason: "node/npx -- dev-pilot Node script + binary execution (mika#1260 nvm/volta toolchain)"

  - id: bash-export-path-bootstrap
    tool: Bash
    pattern: '^export\s+PATH=["'']?[^"'']*(nvm|volta|\.cargo|\.local|\.rustup)[^"'']*:\$PATH'
    decision: allow
    reason: "narrow PATH bootstrap (nvm/volta/cargo/local/rustup, ends :$PATH) -- dev-pilot shell-env setup (mika#1260)"

default:
  decision: deny
  reason: "no matching policy rule -- denied by default (production posture; widen rules to allow new tool footprints)"
